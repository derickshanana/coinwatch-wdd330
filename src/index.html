<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CoinWatch — Real-time currency exchange rates and cryptocurrency prices in one clean dashboard."
    />
    <meta name="theme-color" content="#1a73e8" />
    <title>CoinWatch | Currency &amp; Crypto Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" type="module"></script>
  </head>

  <body>
    <!-- Skip to main content (accessibility) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- ── Header (populated by loadHeaderFooter) ── -->
    <header class="site-header" id="main-header" role="banner"></header>

    <!-- ── Main ── -->
    <main class="site-main" id="main-content" tabindex="-1">
      <!-- ── Currencies Tab Panel ── -->
      <div
        class="tab-panel tab-panel--active"
        id="panel-currencies"
        role="tabpanel"
        aria-labelledby="panel-currencies"
      >
        <div class="panel-layout">
          <!-- Left: Exchange Rates -->
          <section
            class="panel-section panel-section--rates"
            aria-labelledby="rates-heading"
          >
            <div class="section-header">
              <h1 class="section-title" id="rates-heading">Exchange Rates</h1>
              <span
                class="section-meta"
                id="rates-updated"
                aria-live="polite"
                aria-atomic="true"
              ></span>
            </div>

            <div class="controls-bar">
              <div class="control-group">
                <label for="base-currency-select" class="control-label"
                  >Base:</label
                >
                <select
                  id="base-currency-select"
                  class="control-select"
                  aria-label="Select base currency"
                >
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                  <option value="GBP">GBP</option>
                  <option value="JPY">JPY</option>
                  <option value="ZAR">ZAR</option>
                  <option value="CAD">CAD</option>
                  <option value="AUD">AUD</option>
                </select>
              </div>
              <label for="rates-search" class="sr-only"
                >Search currencies</label
              >
              <input
                type="search"
                id="rates-search"
                class="control-search"
                placeholder="Search currencies..."
                aria-label="Search currencies"
                autocomplete="off"
              />
            </div>

            <div
              id="rates-list"
              class="rates-grid"
              role="list"
              aria-label="Currency exchange rates"
              aria-live="polite"
            ></div>
          </section>

          <!-- Right: Converter + Chart -->
          <aside
            class="panel-section panel-section--tools"
            aria-label="Converter and chart tools"
          >
            <!-- Currency Converter -->
            <section class="converter-card" aria-labelledby="converter-heading">
              <h2 class="converter-title" id="converter-heading">
                Currency Converter
              </h2>
              <form id="converter-form" class="converter-form" novalidate>
                <div class="converter-row">
                  <label for="converter-amount" class="sr-only"
                    >Amount to convert</label
                  >
                  <input
                    type="number"
                    id="converter-amount"
                    class="converter-input"
                    placeholder="Enter amount"
                    min="0"
                    step="any"
                  />
                </div>
                <div class="converter-row converter-selects">
                  <label for="converter-from" class="sr-only"
                    >From currency</label
                  >
                  <select id="converter-from" class="converter-select"></select>
                  <button
                    type="button"
                    id="converter-swap"
                    class="swap-btn"
                    aria-label="Swap currencies"
                  >
                    ⇄
                  </button>
                  <label for="converter-to" class="sr-only">To currency</label>
                  <select id="converter-to" class="converter-select"></select>
                </div>
                <div
                  id="converter-result"
                  class="converter-result"
                  role="status"
                  aria-live="polite"
                  aria-atomic="true"
                ></div>
              </form>
            </section>

            <!-- Chart Pair Selector -->
            <section class="chart-pair-card" aria-labelledby="chart-heading">
              <h2 class="converter-title" id="chart-heading">
                7-Day Rate History
              </h2>
              <div class="chart-pair-controls">
                <label for="chart-from" class="sr-only"
                  >Chart from currency</label
                >
                <select id="chart-from" class="converter-select">
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                  <option value="GBP">GBP</option>
                  <option value="JPY">JPY</option>
                  <option value="ZAR">ZAR</option>
                  <option value="CAD">CAD</option>
                  <option value="AUD">AUD</option>
                  <option value="CHF">CHF</option>
                </select>
                <span class="chart-pair-arrow" aria-hidden="true">→</span>
                <label for="chart-to" class="sr-only">Chart to currency</label>
                <select id="chart-to" class="converter-select">
                  <option value="EUR">EUR</option>
                  <option value="USD">USD</option>
                  <option value="GBP">GBP</option>
                  <option value="JPY">JPY</option>
                  <option value="ZAR">ZAR</option>
                  <option value="CAD">CAD</option>
                  <option value="AUD">AUD</option>
                  <option value="CHF">CHF</option>
                </select>
                <button id="chart-draw-btn" class="chart-draw-btn">
                  View Chart
                </button>
              </div>
              <p class="chart-tip">
                Or click any currency card to view its chart
              </p>
            </section>

            <!-- Chart canvas -->
            <div
              id="chart-section"
              class="chart-card hidden"
              aria-label="Exchange rate chart"
            >
              <canvas
                id="rate-chart"
                width="400"
                height="220"
                role="img"
                aria-label="7-day exchange rate history chart"
              ></canvas>
            </div>

            <!-- Chart placeholder (shown before first chart draw) -->
            <div
              class="chart-hint-card"
              id="chart-hint-card"
              aria-hidden="true"
            >
              <span class="chart-hint-icon">📈</span>
              <p>Select a pair above or click a rate card</p>
            </div>
          </aside>
        </div>
      </div>

      <!-- ── Crypto Tab Panel ── -->
      <div
        class="tab-panel"
        id="panel-crypto"
        role="tabpanel"
        aria-labelledby="panel-crypto"
      >
        <div class="section-header">
          <h1 class="section-title">Cryptocurrency Prices</h1>
          <span
            class="section-meta"
            id="crypto-updated"
            aria-live="polite"
            aria-atomic="true"
          ></span>
        </div>

        <div class="controls-bar">
          <label for="crypto-search" class="sr-only"
            >Search cryptocurrencies</label
          >
          <input
            type="search"
            id="crypto-search"
            class="control-search"
            placeholder="Search coins..."
            aria-label="Search cryptocurrencies"
            autocomplete="off"
          />
          <div
            class="filter-group"
            role="group"
            aria-label="Filter by 24h performance"
          >
            <button
              class="filter-btn filter-btn--active"
              data-filter="all"
              aria-pressed="true"
            >
              All
            </button>
            <button
              class="filter-btn"
              data-filter="gainers"
              aria-pressed="false"
            >
              ▲ Gainers
            </button>
            <button
              class="filter-btn"
              data-filter="losers"
              aria-pressed="false"
            >
              ▼ Losers
            </button>
          </div>
          <div class="control-group">
            <label for="crypto-sort" class="control-label">Sort:</label>
            <select
              id="crypto-sort"
              class="control-select"
              aria-label="Sort cryptocurrencies"
            >
              <option value="market_cap">Market Cap</option>
              <option value="price">Price</option>
              <option value="change">24h Change</option>
            </select>
          </div>
        </div>

        <p class="crypto-hint">Click any coin card for full details</p>
        <div
          id="crypto-list"
          class="crypto-grid"
          role="list"
          aria-label="Cryptocurrency prices"
          aria-live="polite"
        ></div>
      </div>

      <!-- ── Portfolio Tab Panel ── -->
      <div
        class="tab-panel"
        id="panel-portfolio"
        role="tabpanel"
        aria-labelledby="panel-portfolio"
      >
        <div class="section-header">
          <h1 class="section-title">My Portfolio</h1>
        </div>

        <div class="portfolio-stats" aria-label="Portfolio summary">
          <div class="portfolio-stat">
            <span class="portfolio-stat__label">Total Value</span>
            <span
              class="portfolio-stat__value"
              id="portfolio-total-value"
              aria-live="polite"
              >$0.00</span
            >
          </div>
          <div class="portfolio-stat">
            <span class="portfolio-stat__label">Total P&amp;L</span>
            <span
              class="portfolio-stat__value"
              id="portfolio-total-pnl"
              aria-live="polite"
              >$0.00</span
            >
          </div>
        </div>

        <div
          id="portfolio-holdings"
          class="portfolio-holdings"
          aria-live="polite"
        ></div>

        <section
          class="portfolio-add-card"
          aria-labelledby="add-holding-heading"
        >
          <h2 class="portfolio-add-title" id="add-holding-heading">
            Add a Holding
          </h2>
          <form id="portfolio-add-form" class="portfolio-add-form" novalidate>
            <div class="portfolio-form-row">
              <div class="portfolio-form-group">
                <label for="portfolio-coin-select">Coin</label>
                <select
                  id="portfolio-coin-select"
                  class="control-select"
                  required
                  aria-required="true"
                >
                  <option value="">Select a coin…</option>
                </select>
              </div>
              <div class="portfolio-form-group">
                <label for="portfolio-amount">Amount Held</label>
                <input
                  type="number"
                  id="portfolio-amount"
                  class="converter-input"
                  placeholder="e.g. 0.5"
                  min="0.000001"
                  step="any"
                  required
                  aria-required="true"
                />
              </div>
              <div class="portfolio-form-group">
                <label for="portfolio-buy-price">Buy Price (USD)</label>
                <input
                  type="number"
                  id="portfolio-buy-price"
                  class="converter-input"
                  placeholder="e.g. 45000"
                  min="0.000001"
                  step="any"
                  required
                  aria-required="true"
                />
              </div>
              <button type="submit" class="portfolio-add-btn">+ Add</button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <!-- ── Footer (populated by loadHeaderFooter) ── -->
    <footer class="site-footer" id="main-footer" role="contentinfo"></footer>
  </body>
</html>
