<a href="/" class="header-logo" aria-label="CoinWatch home">
  <span class="header-logo__icon" aria-hidden="true">💰</span>
  <span class="header-logo__text">Coin<span class="accent">Watch</span></span>
</a>
<nav class="header-nav" aria-label="Main navigation">
  <div class="tab-nav" role="tablist" aria-label="Dashboard sections">
    <button
      class="tab-btn tab-btn--active"
      data-tab="currencies"
      role="tab"
      aria-selected="true"
      aria-controls="panel-currencies"
    >
      <span aria-hidden="true">💱</span> Currencies
    </button>
    <button
      class="tab-btn"
      data-tab="crypto"
      role="tab"
      aria-selected="false"
      aria-controls="panel-crypto"
    >
      <span aria-hidden="true">₿</span> Crypto
    </button>
    <button
      class="tab-btn"
      data-tab="portfolio"
      role="tab"
      aria-selected="false"
      aria-controls="panel-portfolio"
    >
      <span aria-hidden="true">📊</span> Portfolio
    </button>
  </div>
</nav>
<div class="header-actions">
  <button id="theme-toggle" class="theme-btn" aria-label="Switch to light mode">
    ☀️ Light
  </button>
</div>
